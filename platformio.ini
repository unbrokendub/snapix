[platformio]
default_envs = default
extra_configs = platformio.local.ini
packages_dir = .pio/packages

[snapix]
version = 2.0.1

[base]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.37/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600
check_tool = cppcheck
check_flags = --enable=all --suppress=missingIncludeSystem --suppress=unusedFunction --suppress=unmatchedSuppression --suppress=*:*/.pio/* --inline-suppr
check_skip_packages = yes

build_unflags = -fno-lto -Os

board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_upload.offset_address = 0x10000

build_flags =
  -flto=auto
  -O2
  -DARDUINO_USB_MODE=1
  -DARDUINO_USB_CDC_ON_BOOT=1
  -DEINK_DISPLAY_SINGLE_BUFFER_MODE=1
  -DDISABLE_FS_H_WARNING=1
# Disable Arduino HAL internal SPI/UART/I2C locks.  On single-core ESP32-C3
# with the ESP-IDF SMP FreeRTOS port, releasing a priority-inheriting mutex
# (xSemaphoreCreateMutex) triggers an xTaskPriorityDisinherit assertion
# crash (pxTCB == pxCurrentTCBs[0]).  SharedBusLock already serialises all
# SPI access, so the Arduino-internal paramLock / spi->lock are redundant.
  -DCONFIG_DISABLE_HAL_LOCKS=1
# Enable UTF-8 filenames for Cyrillic and other non-ASCII characters
  -DUSE_UTF8_LONG_NAMES=1
# SdFat: close file handle in FsFile destructor (defense-in-depth against FD leaks)
  -DDESTRUCTOR_CLOSES_FILE=1
# https://libexpat.github.io/doc/api/latest/#XML_GE
  -DXML_GE=1
# Enable DTD processing so XML_UseForeignDTD works for HTML entity resolution
  -DXML_DTD
  -DXML_CONTEXT_BYTES=512
  -std=c++2a
  -Isrc
  -Ilib
  -Ilib/Epub
  -Ilib/Fb2

; Board configuration
board_build.flash_mode = dio
board_build.f_flash = 80000000L
board_build.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

extra_scripts =
  pre:scripts/build_html.py

; Libraries (SDK libs now in lib/ folder)
lib_deps =
  bblanchon/ArduinoJson @ 7.4.2
  ricmoo/QRCode @ 0.0.1
  kikuchan98/pngle @ 1.0.2
  file://lib/Hyphenation

[env:default]
extends = base
build_flags =
  ${base.build_flags}
  -DSNAPIX_VERSION=\"${snapix.version}-dev\"
  -DENABLE_SERIAL_LOG
  -DLOG_LEVEL=2
  -DSNAPIX_PERF_LOG=1

[env:release]
extends = base
build_flags =
  ${base.build_flags}
  -DSNAPIX_VERSION=\"${snapix.version}\"
  -DLOG_LEVEL=0
  -DSNAPIX_PERF_LOG=0

[env:gh_release]
extends = release
